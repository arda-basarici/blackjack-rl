[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "blackjack-rl"
version = "0.0.0"
description = "Phase 3 — an RL agent that learns blackjack, audited against the proven-optimal basic strategy."
requires-python = ">=3.13"
dependencies = [
    "numpy",
    # Added at Stage 5 (the DQN). Needs a cp313 wheel: torch >= 2.5 ships one.
    "torch>=2.5",
    # The Phase 2 engine, now a standalone repo — pip resolves it from GitHub. To develop
    # against a local checkout instead, `pip install -e ../blackjack-sim` AFTER installing
    # this package (pip re-resolves this git pin on every install, so editable-last wins).
    "blackjack-sim @ git+https://github.com/arda-basarici/blackjack-sim",
]

[project.optional-dependencies]
dev = ["pytest", "ruff", "pyright"]
# For the analysis notebooks in analysis/ (policy investigation, heatmaps, embedding/PCA).
analysis = ["pandas", "matplotlib", "ipykernel", "scikit-learn"]
report = ["seaborn", "reportlab", "nbconvert"]
# Auto-generated API reference (scripts/make_docs.py). pdoc imports the package, never hand-written.
docs = ["pdoc"]

[tool.setuptools.packages.find]
include = ["blackjack_rl*"]

[tool.ruff]
line-length = 100

# Type checking is Pyright only (one engine for editor + CLI). Config in pyrightconfig.json.

